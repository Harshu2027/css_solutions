<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Moving Ball</title>


  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #eef2ff;
    }

    /*.track {
      width: 400px;
      height: 60px;
      background: #d0d8f8;
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      overflow: hidden;
    }*/

    .ball {
      width: 80px;
      height: 80px;
      background: lightpink;
      border-radius: 50%;
      animation: moveBall 2s ease-in-out infinite;
      animation-iteration-count: infinite;
    }

    @keyframes moveBall {
      0%   { transform: translateX(0px); }
      50%  { transform: translateX(310px); }
      100% { transform: translateX(0px); }
    }
  </style>
</head>
<body>

    <div class="ball"></div>
  </div> -->
  <div class="ball"></div>
</body>
</html>
