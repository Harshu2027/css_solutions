<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Card</title>
  <link rel="stylesheet" href="products.css"/>
</head>
<body>
  <div class="cards-wrapper">
    <div class="product-card">
      <div class="img-wrapper">
        <img src="p1.png" alt="Product 1"/>
      </div>
      <div class="product-info">
        <h3>Wireless Headphones</h3>
        <p class="price" style="color: #28a745; font-weight: bold;">Rs. 2,499</p>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>


    <div class="product-card">
      <div class="img-wrapper">
        <img src="p2.png" alt="Product 2"/>
      </div>
      <div class="product-info">
        <h3>Smart Watch</h3>
        <p class="price" style="color: #28a745; font-weight: bold;">Rs. 4,999</p>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>

    <div class="product-card">
      <div class="img-wrapper">
        <img src="p3.png" alt="Product 3"/>
      </div>
      <div class="product-info">
        <h3>Huawei Tri Fold</h3>
        <p class="price" style="color: #28a745; font-weight: bold;">Rs. 1,79,999</p>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>

  </div>
</body>
</html>
