<!-- Exercise 4: Student Management Dashboard -->
<!-- Uses: Internal CSS + Layout Design + Media Queries -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Management Dashboard</title>


  <style>
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
    }

    body { 
        font-family: Arial, sans-serif; 
        background: #eef2ff; 
    }


    header {
      background: #001f5b;
      color: white;
      padding: 16px 24px;
      font-size: 1.3rem;
      font-weight: bold;
    }

    .wrapper {
      display: flex;
      min-height: calc(100vh - 56px);
    }


    .sidebar {
      width: 220px;
      background: #003399;
      color: white;
      padding: 20px;
      flex-shrink: 0;
    }

    .sidebar h3 {
      margin-bottom: 16px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .sidebar ul { list-style: none; }
    .sidebar ul li { margin-bottom: 12px; }
    .sidebar ul li a {
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
      display: block;
      padding: 8px 10px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .sidebar ul li a:hover { background: #0044bb; }

    
    .main-content {
      flex: 1;
      padding: 24px;
    }

    .main-content h2 {
      color: #001f5b;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;  
      }
    }
  </style>
</head>
<body>
  <header>Student Management System</header>
  <div class="wrapper">
    <aside class="sidebar">
      <h3>Menu</h3>
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="students.html">Students</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="results.html">Results</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </aside>
    <main class="main-content">
      <h2>Dashboard Overview</h2>
      <div class="card"><p>Total Students: 320</p></div>
      <div class="card"><p>Present Today: 290</p></div>
      <div class="card"><p>Results Published: Yes</p></div>
    </main>
  </div>
</body>
</html>
