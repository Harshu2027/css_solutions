<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Image Zoom Effect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .image-container {
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      width: 320px;
      height: 220px;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .image-container img:hover {
      transform: scale(1.5);
    }
  </style>
</head>
<body>
  <div class="image-container">
    <img src="g4.png" alt="Zoom Image"/>
  </div>
</body>
</html>
