<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Animated Button</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .btn {
      padding: 14px 36px;
      font-size: 1rem;
      color: black;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.5s;
    }

    .btn:hover {
      background-color: lightgreen;
      transform: scale(1.1);                
    }
  </style>
</head>
<body>

  <button class="btn" style="background-color: lightblue;">
    Transition Button
  </button>
</body>
</html>
